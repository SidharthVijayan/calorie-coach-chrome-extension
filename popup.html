<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <h1>🍽️ Calorie Coach</h1>

  <!-- USER -->
  <div id="userBox"></div>

  <!-- INPUT -->
  <div class="input-box">
    <input id="foodInput" placeholder="What did you eat?" />
    <button id="logBtn">Log</button>
  </div>

  <!-- RESPONSE -->
  <div id="gameResponse"></div>

  <!-- CALORIES -->
  <div id="totalCalories"></div>

  <!-- LEVEL -->
  <div class="level-box">
    <h3 id="levelTitle"></h3>
    <p id="levelNumber"></p>

    <div class="xp-bar">
      <div id="xpFill"></div>
    </div>

    <p id="xpText"></p>
  </div>

  <!-- MISSIONS -->
  <div id="missions"></div>

  <!-- COACH -->
  <div id="coachStatus"></div>

</div>

<script src="foodDatabase.js"></script>
<script src="xp.js"></script>
<script src="coach.js"></script>
<script src="insights.js"></script>
<script src="popup.js"></script>

</body>
</html>
