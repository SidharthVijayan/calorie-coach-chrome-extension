<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Calorie Coach</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container">

  <div class="header">
    <h1>🍽️ Calorie Coach</h1>
    <p>Track smart. Stay sharp.</p>
  </div>

  <div id="userBox" class="card"></div>

  <div class="card input-card">
    <input id="foodInput" placeholder="2 eggs + biryani" />
    <button id="logBtn">Log</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>🔥 Calories</h3>
      <div id="totalCalories">0 kcal</div>
    </div>

    <div class="card level-box">
      <h3 id="levelTitle">🍔 Rookie</h3>
      <p id="levelNumber">Level 1</p>

      <div class="xp-bar">
        <div id="xpFill"></div>
      </div>

      <div id="xpText">0 / 100 XP</div>
    </div>
  </div>

  <div id="gameResponse" class="card">Start logging your meals 🍽️</div>
  <div id="missions" class="card"></div>
  <div id="coachStatus" class="card"></div>

</div>

<script src="foodDatabase.js"></script>
<script src="xp.js"></script>
<script src="coach.js"></script>
<script src="insights.js"></script>
<script src="popup.js"></script>

</body>
</html>
