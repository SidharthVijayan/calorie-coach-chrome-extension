<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Calorie Coach</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- STYLES -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>🍽️ Calorie Coach</h1>
    <p>Track smart. Stay sharp.</p>
  </div>

  <!-- LOGIN -->
  <div class="card">
    <button id="loginBtn">🔐 Login with Google</button>
  </div>

  <!-- USER -->
  <div id="userBox" class="card">👤 Not logged in</div>

  <!-- INPUT -->
  <div class="card input-card">
    <input id="foodInput" placeholder="2 eggs + biryani" />
    <button id="logBtn">Log</button>
  </div>

  <!-- DASHBOARD -->
  <div class="grid">

    <!-- CALORIES -->
    <div class="card">
      <h3>🔥 Calories</h3>
      <div id="totalCalories">0 kcal</div>
    </div>

    <!-- LEVEL -->
    <div class="card level-box">
      <h3 id="levelTitle">🍔 Rookie</h3>
      <p id="levelNumber">Level 1</p>

      <div class="xp-bar">
        <div id="xpFill"></div>
      </div>

      <div id="xpText">0 / 100 XP</div>
    </div>

  </div>

  <!-- RESPONSE -->
  <div id="gameResponse" class="card">
    Start logging your meals 🍽️
  </div>

  <!-- MISSIONS -->
  <div id="missions" class="card">
    🎯 Mission: Stay within calories
  </div>

  <!-- COACH -->
  <div id="coachStatus" class="card">
    🧠 Coach ready
  </div>

</div>

<!-- 🔥 FIREBASE (CORRECT ORDER - VERY IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- YOUR FIREBASE CONFIG -->
<script src="firebase.js"></script>

<!-- YOUR APP LOGIC -->
<script src="foodDatabase.js"></script>
<script src="xp.js"></script>
<script src="coach.js"></script>
<script src="insights.js"></script>
<script src="popup.js"></script>

</body>
</html>
